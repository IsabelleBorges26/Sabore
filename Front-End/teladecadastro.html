<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faça seu Cadastro</title>
    <link rel="stylesheet" href="teladecadastro.css">
</head>
<body>

<header>
    <img src="./assets/Logo.png" width="150px" height="90px">
</header>

<main class="principal">
    <div class="card">
        <h2>Criar Conta</h2>

        <form>
            <label>Nome</label>
            <input type="text" placeholder="Digite seu nome" />

            <label>E-mail</label>
            <input type="email" placeholder="Digite seu e-mail" />

            <label>Senha</label>
            <input type="password" placeholder="Crie uma senha" />

            <button class="btn-criar">Criar Conta</button>

            <p class="texto">
                Já tem conta? <a href="teladelogin.html">Entrar</a>
            </p>
        </form>
    </div>
</main>

</body>
</html>
