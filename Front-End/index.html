<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saboré • Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="navbar">
      <h1 class="logo">Saboré</h1>
      <nav class="menu">
        <a href="#">Explorar</a>
        <a href="#">Biblioteca</a>
        <a href="#">Gerar Receita</a>
      </nav>
    </header>

    <main class="principal">
      <div class="card">
        <h2>Login</h2>

        <form>
          <label>E-mail</label>
          <input type="email" placeholder="Digite seu e-mail" />

          <label>Senha</label>
          <input type="password" placeholder="Digite sua senha" />

          <div class="lembrar">
            <input type="checkbox" id="lembrar" />
            <label for="lembrar">Lembrar de mim</label>
          </div>

          <button class="btn-entrar">Entrar</button>
          <p class="texto">Não tem conta? <a href="#">Criar conta</a></p>
        </form>
      </div>

      <div class="card">
        <h2>Criar Conta</h2>

        <form>
          <label>Nome</label>
          <input type="text" placeholder="Digite seu nome" />

          <label>E-mail</label>
          <input type="email" placeholder="Digite seu e-mail" />

          <label>Senha</label>
          <input type="password" placeholder="Crie uma senha" />

          <button class="btn-criar">Criar Conta</button>
        </form>
      </div>
    </main>
  </body>
</html>
